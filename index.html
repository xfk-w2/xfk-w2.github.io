<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Emily Dannae</title>
    <style>
        /* Fuentes de sistema redondeadas para máxima optimización (más rápidas que Google Fonts) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .invitacion-card {
            width: 350px;
            /* Tamaño del teléfono */
            background-color: white;
            border: 8px solid #ff69b4;
            /* Borde rosa exterior */
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .header-image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .header-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 10px 20px;
            flex-grow: 1;
        }

        .logo {
            width: 70%;
            margin: -35px auto 10px;
            /* Superponer ligeramente sobre la imagen */
            display: block;
            position: relative;
            z-index: 10;
        }

        .nombre-text {
            font-size: 38px;
            color: #ff69b4;
            /* Rosa fuerte */
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .edad-text {
            font-size: 24px;
            color: #c71585;
            /* Rosa más oscuro */
            font-weight: bold;
            margin: 5px 0 15px;
        }

        .info-box {
            background-color: #fff0f5;
            /* Rosa pálido de fondo para info */
            border: 2px dashed #ff69b4;
            border-radius: 15px;
            padding: 10px;
            margin: 10px 0 15px;
        }

        .sub-title {
            color: #ff69b4;
            font-size: 15px;
            margin: 0 0 10px;
        }

        .data-line {
            font-size: 16px;
            color: #ff69b4;
            margin: 8px 0;
            line-height: 1.4;
        }

        .data-label {
            font-weight: bold;
            color: #c71585;
        }

        .footer-banner {
            background-color: #ff69b4;
            color: white;
            padding: 15px;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            margin-top: auto;
        }

        .banner-text {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
        }

        .watermark {
            font-size: 11px;
            color: #ccc;
            text-align: center;
            margin: 10px 0 5px;
        }
    </style>
</head>

<body>

    <div class="invitacion-card">
        <div class="header-image-container">
            <img src="personajes.jpeg" alt="Personajes" class="header-image">
        </div>

        <img src="logo.png" alt="Chip and Potato Logo" class="logo">

        <div class="content">
            <h1 class="nombre-text">Emily Dannae</h1>
            <p class="edad-text">Cumplo 8 años</p>

            <div class="info-box">
                <p class="sub-title">Te espero en mi fiesta</p>
                <p class="data-line">
                    <span class="data-label">Día:</span><br> Miércoles 29 de Abril
                </p>
                <p class="data-line">
                    <span class="data-label">Lugar:</span><br> Primaria Rodrigo Montes de Oca
                </p>
            </div>
        </div>

        <div class="footer-banner">
            <p class="banner-text">Invitación Digital</p>
        </div>

    </div>

</body>

</html>
